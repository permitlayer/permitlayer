[workspace]
members = ["cargo:crates/permitlayer-daemon"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# No built-in installers — we use our custom install/install.sh instead
installers = []
# Target platforms: macOS ARM64 only for MVP (Epic 7 adds Linux/Windows)
targets = ["aarch64-apple-darwin"]
# Extra files to include in each release artifact
include = ["LICENSE", "README.md", "install/install.sh"]
# Allow our custom release.yml to differ from dist's generated version
# (we add minisign signing steps that dist doesn't know about)
allow-dirty = ["ci"]
