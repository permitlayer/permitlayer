[workspace]
members = ["cargo:crates/permitlayer-daemon"]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# Homebrew installer drives generation of the tap formula (Story 7.1).
# The curl|sh path (install/install.sh) remains the default for non-macOS.
installers = ["homebrew"]
# Target platforms:
# - macOS ARM64 (aarch64-apple-darwin): original MVP target (Story 1.12).
# - macOS x86_64 (x86_64-apple-darwin): added in Story 7.1 so the Homebrew
#   formula has both-arch URLs (Hardware::CPU.arm? / .intel? branches).
# - Windows x86_64 (x86_64-pc-windows-msvc): added in Story 7.2. Drives the
#   PowerShell installer (install/install.ps1) + ClawHub skill that wraps
#   `agentsso` on Windows. dist 0.31 emits a .zip artifact for this target;
#   sha256 sidecar (no Authenticode yet — see Story 7.2 Dev Notes for why).
# - Linux x86_64 (x86_64-unknown-linux-gnu): added in Story 7.7. Matches
#   install.sh:142's expected target (the script was wired for this triple
#   from Story 1.12; dist just wasn't building it). glibc target — musl is
#   a separate future-story consideration. NFR49 requires glibc 2.31+
#   (Ubuntu 20.04+, Debian 11+, Fedora 34+, Arch).
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-pc-windows-msvc", "x86_64-unknown-linux-gnu"]
# Extra files to include in each release artifact
include = ["LICENSE", "README.md", "install/install.sh"]
# Homebrew tap configuration (Story 7.1): dist emits Formula/agentsso.rb
# targeting this tap. Our homebrew-publish job in release.yml patches the
# generated formula (adds service + caveats blocks — dist's template
# omits both) and pushes to the tap repo using HOMEBREW_TAP_TOKEN.
tap = "permitlayer/homebrew-tap"
formula = "agentsso"
# Pre-release tags (e.g. v0.2.0-rc.1) do NOT auto-update the tap by default.
# Override via the HOMEBREW_PUBLISH_PRERELEASES repo variable in the
# release.yml job guard when exercising the pipeline end-to-end.
publish-prereleases = false
# Allow our custom release.yml to differ from dist's generated version
# (we add minisign signing steps + a homebrew-publish job that dist doesn't
# know about).
allow-dirty = ["ci"]

# Linux build-time system deps. The keystore crate's
# `linux-native-sync-persistent` feature pulls `libdbus-sys`, whose
# build script links against libdbus-1 via pkg-config. Without the
# `-dev` headers + pkg-config on the runner, `cargo build` fails
# during `build-local-artifacts (x86_64-unknown-linux-gnu)`. dist
# threads this map into the matrix's `packages_install` step
# (release.yml:198), so the runner runs `apt-get install -y
# libdbus-1-dev pkg-config` before invoking `dist build`. macOS uses
# the Apple keychain (no extra deps); Windows uses Win32 (no extra
# deps).
#
# Surfaced when v0.3.0-rc.2 was the first tag to actually trigger
# the Linux build leg post-Story-7.7 target addition; v0.3.0-rc.1
# shipped without Linux artifacts because the gap hadn't been hit
# yet.
[dist.dependencies.apt]
libdbus-1-dev = "*"
pkg-config = "*"
