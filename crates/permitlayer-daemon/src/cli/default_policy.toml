# permitlayer default policy file.
#
# This file ships with every install. Edit it to match your setup,
# or copy it to a new file (e.g. `my-team.toml`) in the same
# directory and register agents against the new policy name.
#
# Conventions used throughout this file:
#   - Keys are kebab-case (TOML idiom).
#   - Policy and rule IDs are stable strings. They appear verbatim
#     in HTTP 403 response bodies so you can grep this file to find
#     the rule that denied a request.
#   - Rules are evaluated in declaration order. The first rule whose
#     scopes AND resources match wins. If no rule matches, the
#     policy's `approval-mode` default applies.
#   - `scopes = ["*"]` is NOT valid. List every scope you allow
#     explicitly — default-deny applies to anything not listed.
#   - `resources = ["*"]` means "any resource". Use explicit values
#     like `["primary"]` to narrow to specific calendars, labels, etc.
#
# Access model (headless daemon — no approval, no prompt):
#
# This daemon runs HEADLESS. There is no human-in-the-loop approval
# and no terminal prompt: a request is either ALLOWED because its
# scope is granted (`approval-mode = "auto"`, the only disposition
# this product ships) or DENIED because the scope is absent from the
# policy's allowlist (default-deny) or an explicit `deny` rule. The
# `prompt` disposition is intentionally unsupported here — on a
# headless daemon it can only ever return HTTP 503, so the shipped
# bundle never uses it. Choose access by NAMING a policy when you
# bind an agent: a `-read-only` tier grants reads only; a
# `-read-write` tier additionally grants that service's write scopes
# (no gate — pick it deliberately).

# -----------------------------------------------------------------
# Policy: gmail-read-only
#
# Use this for an agent that should only read Gmail. Every read is
# auto-approved. Any attempt to modify, send, or trash is blocked
# by the default-deny fallback — only scopes listed below can
# ever reach the upstream API.
# -----------------------------------------------------------------
[[policies]]
name = "gmail-read-only"
# Only these two scopes are allowed. Any other scope (`gmail.modify`,
# `gmail.send`, `gmail.trash`, etc.) is blocked with HTTP 403 and
# rule_id = "default-deny-scope-out-of-allowlist".
scopes = ["gmail.readonly", "gmail.metadata"]
# All mailboxes. Narrow by listing explicit label IDs if you want
# to restrict to, say, only the Inbox.
resources = ["*"]
# Default disposition for requests that match the allowlist but
# don't hit any rule below. `auto` means auto-approve (the only
# disposition this headless product ships).
approval-mode = "auto"
# Auto-approve read-style scopes (.readonly / .metadata). On this
# headless deployment all granted scopes auto-approve anyway; the
# flag is retained for forward compatibility / clarity of intent.
auto-approve-reads = true

# No explicit rules needed. The scope allowlist above is the
# complete spec: reads are allowed, everything else is denied by
# the default-deny fallback. A rule that tried to name specific
# "deny" scopes would be rejected at compile time because those
# scopes aren't in the allowlist (see RuleScopeWidensPolicyAllowlist).

# -----------------------------------------------------------------
# Policy: drive-research-scope-restricted
#
# Use this for an agent that does read-only research across Drive
# but must not touch any file outside a specific shared folder. The
# `resources = ["research-shared"]` line narrows every request to
# exactly that folder ID.
# -----------------------------------------------------------------
[[policies]]
name = "drive-research-scope-restricted"
scopes = ["drive.readonly", "drive.metadata"]
# Only this specific folder ID. Swap it for a real folder ID from
# your Drive when you wire an agent up. Anything else → 403 with
# rule_id = "default-deny-resource-out-of-allowlist".
resources = ["research-shared"]
approval-mode = "auto"
auto-approve-reads = true

# =================================================================
# Per-service read-only / read-write tier templates.
#
# Pick a tier by NAMING one of these policies when you bind an agent
# (read-vs-write is a policy choice, not a different connector or
# OAuth grant). The `-read-only` tiers list only read scopes; the
# compile-time allowlist makes any write structurally impossible (a
# write scope is rejected with HTTP 403
# default-deny-scope-out-of-allowlist). The `-read-write` tiers
# additionally grant that service's write scopes and auto-approve
# them — this daemon is HEADLESS, there is no write gate, so a
# `-read-write` tier is a deliberate grant of autonomous write.
#
# SECURITY: an agent on a `-read-write` tier can send mail,
# permanently modify the inbox, and create/delete/move calendar
# events with NO human gate. Read tools can also expose message
# bodies, attachments, and 2FA codes — that read-exfiltration
# residual risk is accepted with eyes open and documented in
# docs/user-guide/connector-tiers.md and the threat-model it links.
# The scrub engine is NOT expanded to redact this. Bind a
# `-read-write` tier only when autonomous write is intended.
#
# The [[policies]] blocks below are byte-identical with
# test-fixtures/policies/default.toml (only comments differ); an
# integration test asserts the two files' policy sets are equal, and
# a CI-blocking leak-test asserts NO policy here uses the `prompt`
# disposition (it would silently 503 on this headless daemon).
# =================================================================

# -----------------------------------------------------------------
# Policy: gmail-read-write
#
# Reads (gmail.readonly / gmail.metadata, incl. all settings reads)
# and writes — send (gmail.send), draft create/update/send
# (gmail.compose), and inbox modify/trash/untrash (gmail.modify) —
# are all granted and auto-approved (headless, no gate). NOTE: there
# is no gmail.settings.basic scope (all Gmail settings reads use
# gmail.readonly) and no permanent-delete tool (gmail.messages.delete
# is intentionally not shipped — it would require the broad
# mail.google.com scope).
# -----------------------------------------------------------------
[[policies]]
name = "gmail-read-write"
scopes = ["gmail.readonly", "gmail.metadata", "gmail.send", "gmail.compose", "gmail.modify"]
resources = ["*"]
approval-mode = "auto"
auto-approve-reads = true

[[policies.rules]]
id = "allow-gmail-reads"
scopes = ["gmail.readonly", "gmail.metadata"]
action = "allow"

[[policies.rules]]
id = "allow-gmail-writes"
scopes = ["gmail.send", "gmail.compose", "gmail.modify"]
action = "allow"

# -----------------------------------------------------------------
# Policy: calendar-read-only
#
# Read-only across all calendars. Any write scope (calendar.events)
# is blocked by default-deny — this tier cannot create, edit, move,
# or delete events.
# -----------------------------------------------------------------
[[policies]]
name = "calendar-read-only"
scopes = ["calendar.readonly"]
resources = ["*"]
approval-mode = "auto"
auto-approve-reads = true

# -----------------------------------------------------------------
# Policy: calendar-read-write
#
# Reads and event create/update/patch/delete/move/quickAdd
# (calendar.events) are all granted and auto-approved (headless, no
# gate). Spans all calendars (resources = ["*"]); narrow to
# resources = ["primary"] if you want to restrict to the primary
# calendar.
# -----------------------------------------------------------------
[[policies]]
name = "calendar-read-write"
scopes = ["calendar.readonly", "calendar.events"]
resources = ["*"]
approval-mode = "auto"
auto-approve-reads = true

[[policies.rules]]
id = "allow-calendar-reads"
scopes = ["calendar.readonly"]
action = "allow"

[[policies.rules]]
id = "allow-calendar-writes"
scopes = ["calendar.events"]
action = "allow"

# -----------------------------------------------------------------
# Policy: drive-read-only
#
# Read-only across Drive. The write scope (drive.file) is blocked by
# default-deny — this tier cannot create, modify, copy, or delete.
# -----------------------------------------------------------------
[[policies]]
name = "drive-read-only"
scopes = ["drive.readonly"]
resources = ["*"]
approval-mode = "auto"
auto-approve-reads = true

# -----------------------------------------------------------------
# Policy: drive-read-write
#
# Reads and create/update/copy/delete (drive.file) are all granted
# and auto-approved (headless, no gate). Note drive.file limits
# writes to files this app created or opened, and drive.files.delete
# is PERMANENT (bypasses trash) — there is no prompt gate, so bind
# this tier only when autonomous write is intended.
# -----------------------------------------------------------------
[[policies]]
name = "drive-read-write"
scopes = ["drive.readonly", "drive.file"]
resources = ["*"]
approval-mode = "auto"
auto-approve-reads = true

[[policies.rules]]
id = "allow-drive-reads"
scopes = ["drive.readonly"]
action = "allow"

[[policies.rules]]
id = "allow-drive-writes"
scopes = ["drive.file"]
action = "allow"

# -----------------------------------------------------------------
# Policy: gmail-read-only-tier
#
# The Gmail read-only tier under the consistent `{svc}-read-only`
# naming. The original `gmail-read-only` policy is retained above
# unchanged for backward compatibility (existing agents and
# policy-edit tests bind to it by name); this is the
# naming-consistent alias for new setups.
# -----------------------------------------------------------------
[[policies]]
name = "gmail-read-only-tier"
scopes = ["gmail.readonly", "gmail.metadata"]
resources = ["*"]
approval-mode = "auto"
auto-approve-reads = true
