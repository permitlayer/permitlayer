# permitlayer-specific CodeQL sanitizer/barrier models (models-as-data).
#
# Tuple schemas (from github/codeql rust ModelsAsData.qll):
#   barrierModel:      [ path, output, kind, provenance ]
#   barrierGuardModel: [ path, input, acceptingValue, kind, provenance ]
#
# `path` is the crate-qualified item: `crate::module::function` for free
# functions, `<crate::module::Type>::method` for methods.
extensions:
  # ── Path traversal (rust/path-injection) ─────────────────────────────
  #
  # `canonical_dir_within_root(dir, trusted_root)` canonicalizes `dir`
  # (resolving symlinks + `..`) and returns `Ok(Some(_))` ONLY when the
  # result stays at/under `trusted_root`; anything escaping the root is
  # rejected with `ErrorKind::InvalidInput`. Its returned path is therefore
  # a normalized, prefix-verified path — a path-traversal barrier. The
  # `normalize-path` kind is the hook the TaintedPath config consumes
  # (DataflowImpl::optionalBarrier(node, "normalize-path")).
  - addsTo:
      pack: codeql/rust-all
      extensible: barrierModel
    data:
      - ["permitlayer_core::paths::canonical_dir_within_root", "ReturnValue", "normalize-path", "manual"]

  # ── Cleartext logging (rust/cleartext-logging) ───────────────────────
  #
  # `AccountHint` is the one PII-bearing field on the otherwise secret-free
  # `ConnectionRecord` (the module guarantees "NO ciphertext, no tokens, no
  # client secret"). Its `Display`/`Debug`/`masked` emit a redacted form
  # (`ag•••@gmail.com`), so their output is safe to print/log — a genuine
  # cleartext-logging sanitizer. The `log-injection` kind is the hook the
  # CleartextLogging config consumes (barrierNode(this, "log-injection")).
  - addsTo:
      pack: codeql/rust-all
      extensible: barrierModel
    data:
      - ["<permitlayer_core::store::connection::AccountHint>::masked", "ReturnValue", "log-injection", "manual"]
      - ["<permitlayer_core::store::connection::AccountHint>::fmt", "ReturnValue", "log-injection", "manual"]
