# release.yml — canonical cargo-dist 0.31 release pipeline
# plus permitlayer-specific signing and Homebrew-tap publication.
#
# The canonical pipeline (jobs: plan, build-local-artifacts,
# build-global-artifacts, host, announce) is autogenerated by
# `dist generate --mode=ci` (cargo-dist 0.31). It is kept byte-for-byte
# close to canonical output so that future dist upgrades are re-runs of
# `dist generate`, not archaeology. See ADR 0005 for the
# release-automation identity decision that backs the tap push.
#
# Two jobs layer on top of the canonical output and are hand-maintained:
#
#   - `sign` — ed25519/minisign signing of all binary tarballs.
#     The RELEASE_SIGNING_KEY GitHub secret contains the minisign
#     secret-key file contents. Each artifact gets a .minisig sibling
#     uploaded alongside it. Runs after build-global-artifacts, before
#     host, so the sigs become part of the release artifact bundle
#     picked up by `dist host --steps=upload --steps=release`.
#     minisign is installed via apt — the crates.io `minisign` crate is
#     a library, NOT the CLI; `cargo install` fails.
#
#   - `homebrew-publish` — patches the dist-generated Formula/agentsso.rb
#     (dist's template emits neither `service do` nor `caveats`), runs
#     brew audit + brew style, pushes to permitlayer/homebrew-tap
#     using HOMEBREW_TAP_TOKEN, smoke-tests `brew tap && brew install`,
#     and opens an automated PR to refresh install/Formula/agentsso.rb.
#     Pre-release tags (contain a hyphen in the version) skip the tap
#     push unless the HOMEBREW_PUBLISH_PRERELEASES repo variable is set
#     to "1". See Story 7.1 (_bmad-output/implementation-artifacts/
#     7-1-homebrew-formula.md) for the full rationale.
#
# Cross-platform signing (Apple notarization, GPG, Authenticode) is
# deferred to later Epic 7 stories when Linux/Windows targets land.
# For macOS today, ed25519/minisign satisfies the AC in Story 1.12.

name: Release
permissions:
  contents: write
  # homebrew-publish opens an automated PR against main to refresh
  # install/Formula/agentsso.rb (the reference copy; the tap is the
  # source of truth).
  pull-requests: write

# Triggered by:
# - Any git tag matching `**[0-9]+.[0-9]+.[0-9]+*` (e.g. v0.2.0,
#   v0.2.0-rc.1, 0.2.0). Pushing a tag announces a release.
# - Any pull request. PR runs invoke `dist plan` in plan-only mode,
#   catching workflow breakage before a tag push is required.
on:
  pull_request:
  push:
    tags:
      - '**[0-9]+.[0-9]+.[0-9]+*'

jobs:
  # Run 'dist plan' (or host) to determine what tasks we need to do
  plan:
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ !github.event.pull_request && github.ref_name || '' }}
      tag-flag: ${{ !github.event.pull_request && format('--tag={0}', github.ref_name) || '' }}
      publishing: ${{ !github.event.pull_request }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        # we specify bash to get pipefail; it guards against the `curl` command
        # failing. otherwise `sh` won't catch that `curl` returned non-0
        shell: bash
        run: "curl --proto '=https' --tlsv1.2 -LsSf https://github.com/axodotdev/cargo-dist/releases/download/v0.31.0/cargo-dist-installer.sh | sh"
      - name: Cache dist
        uses: actions/upload-artifact@v6
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/dist
      # sure would be cool if github gave us proper conditionals...
      # so here's a doubly-nested ternary-via-truthiness to try to provide the best possible
      # functionality based on whether this is a pull_request, and whether it's from a fork.
      # (PRs run on the *source* but secrets are usually on the *target* -- that's *good*
      # but also really annoying to build CI around when it needs secrets to work right.)
      - id: plan
        run: |
          dist ${{ (!github.event.pull_request && format('host --steps=create --tag={0}', github.ref_name)) || 'plan' }} --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  # Build and packages all the platform-specific things
  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    # Let the initial task tell us to not run (currently very blunt)
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      # Target platforms/runners are computed by dist in create-release.
      # Each member of the matrix has the following arguments:
      #
      # - runner: the github runner
      # - dist_args: cli flags to pass to dist
      # - install_dist: expression to run to install dist on the runner
      #
      # Typically there will be:
      # - 1 "global" task that builds universal installers
      # - N "local" tasks that build each platform's binaries and platform-specific installers
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust non-interactively if not already installed
        if: ${{ matrix.container }}
        run: |
          if ! command -v cargo > /dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi
      - name: Install dist
        run: ${{ matrix.install_dist.run }}
      # Get the dist-manifest
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          # Actually do builds and make zips and whatnot
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        # We force bash here just because github makes it really hard to get values up
        # to "real" actions without writing to env-vars, and writing to env-vars has
        # inconsistent syntax between shell and powershell.
        shell: bash
        run: |
          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          dist print-upload-files-from-manifest --manifest dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # Build and package all the platform-agnostic(ish) things
  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Get all the local artifacts for the global tasks to use (for e.g. checksums)
      - name: Fetch local artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          echo "dist ran successfully"

          # Parse out what we just built and upload it to scratch storage
          echo "paths<<EOF" >> "$GITHUB_OUTPUT"
          jq --raw-output ".upload_files[]" dist-manifest.json >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: "Upload artifacts"
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  # permitlayer-custom: ed25519/minisign signatures on binary tarballs.
  # Runs after global build (which produces source tarball + sha256 sums)
  # and before host (which creates the GitHub Release).
  sign:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') }}
    # ubuntu-latest (noble / 24.04) — the `minisign` package isn't in the
    # default repos on ubuntu-22.04 (jammy). ci.yml's shellcheck job uses
    # the same pattern on ubuntu-latest successfully.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Install minisign
        run: |
          # `cargo install minisign` doesn't work — the minisign crate on
          # crates.io is a library, not the CLI binary. The real CLI lives
          # in Ubuntu's repos; requires ubuntu-latest (24.04), not 22.04.
          sudo apt-get update
          sudo apt-get install -y minisign
      - name: Fetch all artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-build-*
          path: target/distrib/
          merge-multiple: true
      - name: Sign artifacts with ed25519
        env:
          RELEASE_SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
          RELEASE_SIGNING_PASSWORD: ${{ secrets.RELEASE_SIGNING_PASSWORD }}
        run: |
          if [ -z "${RELEASE_SIGNING_KEY}" ]; then
            echo "::error::RELEASE_SIGNING_KEY secret is not set"
            exit 1
          fi
          if [ -z "${RELEASE_SIGNING_PASSWORD:-}" ]; then
            echo "::error::RELEASE_SIGNING_PASSWORD secret is not set"
            exit 1
          fi

          # Write secret key to temp file
          KEY_FILE="$(mktemp)"
          trap 'rm -f "$KEY_FILE"' EXIT
          echo "${RELEASE_SIGNING_KEY}" > "$KEY_FILE"

          # Sign each tarball/zip artifact (skip manifests, checksums, sigs).
          # The minisign CLI prompts for the key password on /dev/tty, falling
          # back to stdin when /dev/tty is unavailable (CI runners). We pipe
          # the password via stdin on each invocation.
          for artifact in target/distrib/*.tar.xz target/distrib/*.tar.gz target/distrib/*.zip; do
            [ -f "$artifact" ] || continue
            echo "Signing: $(basename "$artifact")"
            printf '%s\n' "$RELEASE_SIGNING_PASSWORD" | \
              minisign -Sm "$artifact" -s "$KEY_FILE" -t "$(basename "$artifact") signed by permitlayer release pipeline"
          done

          rm -f "$KEY_FILE"
          trap - EXIT

          # Verify at least one artifact was signed
          SIG_COUNT="$(find target/distrib -name '*.minisig' 2>/dev/null | wc -l | tr -d ' ')"
          if [ "$SIG_COUNT" = "0" ]; then
            echo "::error::No artifacts were signed. Expected at least one .minisig file."
            exit 1
          fi
          echo "Signatures generated: ${SIG_COUNT}"
          ls -la target/distrib/*.minisig
      - name: Upload signatures
        uses: actions/upload-artifact@v6
        with:
          # `artifacts-*` pattern is what host's Fetch artifacts step
          # picks up, so the .minisig files flow into the GitHub Release
          # naturally via dist's `gh release create ... artifacts/*`.
          name: artifacts-signatures
          path: target/distrib/*.minisig

  # Determines if we should publish/announce
  host:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - sign
    # Only run if we're "publishing", sign succeeded, and plan/local/global
    # didn't fail (skipped is fine for local/global).
    if: ${{ always() && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && needs.sign.result == 'success' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.host.outputs.manifest }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install cached dist
        uses: actions/download-artifact@v7
        with:
          name: cargo-dist-cache
          path: ~/.cargo/bin/
      - run: chmod +x ~/.cargo/bin/dist
      # Fetch artifacts from scratch-storage
      - name: Fetch artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: host
        shell: bash
        run: |
          dist host ${{ needs.plan.outputs.tag-flag }} --steps=upload --steps=release --output-format=json > dist-manifest.json
          echo "artifacts uploaded and released successfully"
          cat dist-manifest.json
          echo "manifest=$(jq -c "." dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: "Upload dist-manifest.json"
        uses: actions/upload-artifact@v6
        with:
          # Overwrite the previous copy
          name: artifacts-dist-manifest
          path: dist-manifest.json
      # permitlayer-custom (Story 7.1): expose the dist-generated formula
      # as a named Actions artifact so homebrew-publish can consume it
      # directly, without parsing the merged artifacts dump. Must run
      # before the Cleanup step strips granular manifests.
      - name: Upload generated Homebrew formula
        uses: actions/upload-artifact@v6
        with:
          name: artifacts-homebrew-formula
          path: target/distrib/agentsso.rb
          if-no-files-found: error
      # Create a GitHub Release while uploading all files to it
      - name: "Download GitHub Artifacts"
        uses: actions/download-artifact@v7
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup
        run: |
          # Remove the granular manifests
          rm -f artifacts/*-dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: "${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}"
          ANNOUNCEMENT_TITLE: "${{ fromJson(steps.host.outputs.manifest).announcement_title }}"
          ANNOUNCEMENT_BODY: "${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}"
          RELEASE_COMMIT: "${{ github.sha }}"
        run: |
          # Write and read notes from a file to avoid quoting breaking things
          echo "$ANNOUNCEMENT_BODY" > "$RUNNER_TEMP/notes.txt"

          gh release create "${{ needs.plan.outputs.tag }}" --target "$RELEASE_COMMIT" $PRERELEASE_FLAG --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  announce:
    needs:
      - plan
      - host
    # use "always() && ..." to allow us to wait for all publish jobs while
    # still allowing individual publish jobs to skip themselves (for prereleases).
    # "host" however must run to completion, no skipping allowed!
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: "ubuntu-22.04"
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

  # permitlayer-custom (Story 7.1): Homebrew tap publication.
  #
  # After `host` uploads the dist-generated formula as the
  # `artifacts-homebrew-formula` Actions artifact, this job:
  #   1. Patches the formula (adds `service do` + `caveats` blocks — dist's
  #      0.31 Homebrew template emits neither).
  #   2. Runs `brew audit --strict` + `brew style` on the patched output
  #      (AC #5). Job fails loudly if the formula stops parsing.
  #   3. Pushes the patched formula to permitlayer/homebrew-tap
  #      (direct-push, Homebrew tap convention) via HOMEBREW_TAP_TOKEN.
  #   4. Smoke-tests `brew tap && brew install && agentsso --version` on
  #      the runner (AC #1). Job fails if install or version check fails.
  #   5. Opens an automated PR against main to refresh the reference copy
  #      at install/Formula/agentsso.rb (AC #7) — PR uses default
  #      GITHUB_TOKEN; auto-merge is off, human reviews.
  #
  # Pre-release gate: tags with a hyphen in the version part (v0.2.0-rc.1)
  # skip the tap push unless the HOMEBREW_PUBLISH_PRERELEASES repo
  # variable is set to "1" (see Story 7.1 Task 5.1 for rationale).
  homebrew-publish:
    needs:
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - sign
      - host
    if: ${{ always() && needs.host.result == 'success' }}
    runs-on: macos-14
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      TAG: ${{ needs.plan.outputs.tag }}
      PUBLISH_PRERELEASES: ${{ vars.HOMEBREW_PUBLISH_PRERELEASES }}
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Decide whether this tag is a pre-release
        id: gate
        shell: bash
        run: |
          # Semver pre-release tags contain a hyphen in the version part.
          # e.g. v0.2.0-rc.1 is a pre-release; v0.2.0 is not.
          if [[ "$TAG" == *-* ]]; then
            IS_PRERELEASE=1
          else
            IS_PRERELEASE=0
          fi
          if [ "$IS_PRERELEASE" = "1" ] && [ "${PUBLISH_PRERELEASES:-}" != "1" ]; then
            echo "skip=1" >> "$GITHUB_OUTPUT"
            echo "::notice::Tag $TAG is a pre-release and HOMEBREW_PUBLISH_PRERELEASES != 1; skipping tap push"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Early exit for gated pre-release
        if: ${{ steps.gate.outputs.skip == '1' }}
        run: exit 0

      - name: Verify HOMEBREW_TAP_TOKEN is configured
        if: ${{ steps.gate.outputs.skip == '0' }}
        run: |
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "::error::HOMEBREW_TAP_TOKEN secret is not set. Configure per docs/adrs/0005-release-automation-identity.md."
            exit 1
          fi
          echo "Token length: ${#TAP_TOKEN}"

      - name: Download dist-generated formula
        if: ${{ steps.gate.outputs.skip == '0' }}
        uses: actions/download-artifact@v7
        with:
          name: artifacts-homebrew-formula
          path: dist-formula

      - name: Patch formula (inject service + caveats)
        if: ${{ steps.gate.outputs.skip == '0' }}
        run: |
          mkdir -p Formula
          scripts/patch-homebrew-formula.sh \
              dist-formula/agentsso.rb \
              Formula/agentsso.rb
          echo "--- Patched formula ---"
          cat Formula/agentsso.rb

      # Autocorrect formula style with rubocop, then assert zero
      # remaining offenses. `brew style --fix` applies rubocop
      # autocorrect in-place; `brew style` (no --fix) exits non-zero if
      # anything remains.
      #
      # Why this and not `brew audit --strict`:
      #
      # - `brew audit [path]` is disabled in modern Homebrew; only
      #   `brew audit [formula-name]` works against a tapped formula.
      #   That would require pushing first, then auditing, which
      #   defeats pre-push gating.
      # - Dist's Homebrew template emits rubocop-style offenses that
      #   are all [Correctable] by autocorrect (article-in-desc,
      #   unfrozen constant, modifier-if, trailing comma). Fixing them
      #   in our patch script would shadow-fork dist's template and
      #   break on every dist upgrade.
      # - `brew style --fix` is idempotent and uses the exact same
      #   rubocop rules that `brew audit --strict` would check. If any
      #   non-autocorrectable rule triggers (e.g. Style/Documentation,
      #   which needs a class-doc comment), the second `brew style`
      #   invocation fails the job.
      # - The `Style/Documentation` rule needing a class-doc comment is
      #   handled by the patch script (`scripts/patch-homebrew-formula.sh`
      #   prepends one before `class Agentsso < Formula`).
      # - Functional gate is the install smoke test below.
      - name: Autocorrect formula style + verify zero offenses
        if: ${{ steps.gate.outputs.skip == '0' }}
        run: |
          # macos-14 ships brew preinstalled.
          brew style --fix Formula/agentsso.rb
          echo "--- Formula after brew style --fix ---"
          cat Formula/agentsso.rb
          echo "--- Verifying zero remaining offenses ---"
          brew style Formula/agentsso.rb

      - name: Push formula to permitlayer/homebrew-tap
        if: ${{ steps.gate.outputs.skip == '0' }}
        run: |
          TAP_DIR="$(mktemp -d)"
          trap 'rm -rf "$TAP_DIR"' EXIT
          git clone "https://oauth2:${TAP_TOKEN}@github.com/permitlayer/homebrew-tap.git" "$TAP_DIR"
          cp Formula/agentsso.rb "$TAP_DIR/Formula/agentsso.rb"
          cd "$TAP_DIR"
          git config user.name "permitlayer release bot"
          git config user.email "release-bot@permitlayer.dev"
          if git diff --quiet -- Formula/agentsso.rb; then
            echo "::notice::Formula unchanged vs tap; nothing to push"
            exit 0
          fi
          git add Formula/agentsso.rb
          git commit -m "agentsso ${TAG}"
          git push origin main

      - name: Smoke test — brew tap && brew install && agentsso --version
        if: ${{ steps.gate.outputs.skip == '0' }}
        run: |
          brew tap permitlayer/tap
          brew install permitlayer/tap/agentsso
          INSTALLED_VERSION="$(agentsso --version)"
          echo "Installed: $INSTALLED_VERSION"
          # Tag 'v0.2.0-rc.1' → formula version '0.2.0-rc.1' → agentsso
          # --version is expected to contain '0.2.0-rc.1' or similar.
          EXPECTED_VERSION="${TAG#v}"
          if ! printf '%s\n' "$INSTALLED_VERSION" | grep -q "$EXPECTED_VERSION"; then
            echo "::error::agentsso --version ($INSTALLED_VERSION) did not contain expected tag ($EXPECTED_VERSION)"
            exit 1
          fi

      - name: Open automated PR to refresh install/Formula/agentsso.rb
        if: ${{ steps.gate.outputs.skip == '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="automated/homebrew-formula-${TAG}"
          git config user.name "permitlayer release bot"
          git config user.email "release-bot@permitlayer.dev"
          # Avoid collision if the branch already exists (re-run case).
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "::notice::Branch $BRANCH already exists upstream; skipping PR creation"
            exit 0
          fi
          git checkout -b "$BRANCH"
          mkdir -p install/Formula
          cp Formula/agentsso.rb install/Formula/agentsso.rb
          if git diff --quiet -- install/Formula/agentsso.rb; then
            echo "::notice::Reference formula unchanged; no PR needed"
            exit 0
          fi
          git add install/Formula/agentsso.rb
          git commit -m "chore(release): refresh install/Formula/agentsso.rb for ${TAG}"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --title "chore(release): refresh install/Formula/agentsso.rb for ${TAG}" \
            --body "Automated PR from the release pipeline ($TAG). This copies the latest released Homebrew formula into install/Formula/ as a reference — the tap repo (permitlayer/homebrew-tap) is the source-of-truth served to brew users. Review and merge at your convenience; this is not a release blocker." \
            --label automated-release \
            --base main \
            --head "$BRANCH"

      - name: Partial-failure issue on error
        if: ${{ failure() && steps.gate.outputs.skip == '0' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The tap push may have succeeded before a later step failed;
          # surface that possibility on the created issue so a human can
          # confirm or roll back manually.
          #
          # The `release-issue` label is created as a one-off admin step
          # via `gh label create release-issue --repo permitlayer/permitlayer
          # --color FF6B6B --description "Release pipeline partial
          # failure — needs triage"`. `gh issue create --label` fails
          # hard if the label is missing, so we use `|| true` as a
          # safety net and still create the issue without the label.
          gh issue create \
            --title "Release ${TAG}: Homebrew publish partial failure" \
            --body "The homebrew-publish job for tag \`${TAG}\` failed. If the tap push step ran before the failure, \`permitlayer/homebrew-tap\`'s Formula/agentsso.rb may be out of sync with the main repo. Job logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label release-issue \
            || gh issue create \
              --title "Release ${TAG}: Homebrew publish partial failure" \
              --body "The homebrew-publish job for tag \`${TAG}\` failed. Job logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
