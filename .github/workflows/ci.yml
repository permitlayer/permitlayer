name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref so newer pushes don't wait for stale
# builds — but NEVER cancel runs on `main`, because every main-branch commit
# must complete its security gates (audit, deny, credential discipline) and
# leave a green/red status behind for incident forensics.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        # rust-toolchain.toml pins the channel automatically.
        run: |
          rustup show active-toolchain || rustup toolchain install
          rustup component add rustfmt clippy
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      # permitlayer-keystore's Linux backend links libdbus via the
      # `keyring` crate → `secret-service` → `dbus-rs` → `libdbus-sys`
      # chain. Cross-compiling clippy on Linux still triggers the
      # build script, so the system dep is required even for a
      # lint-only job.
      - name: Install libdbus (clippy build deps)
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  # Story 7.7: four-OS matrix enforcing NFR47 cross-platform parity.
  # Each leg runs the full workspace test suite against its native
  # KeyStore backend (macos.rs / linux.rs / windows.rs); a failure on
  # any leg blocks the PR. fail-fast: false so a Linux flake doesn't
  # mask Windows + macOS visibility on the same PR.
  #
  # Linux requires a running secret-service backend (gnome-keyring +
  # dbus session) before tests run, otherwise LinuxKeyStore conformance
  # silently skips with BackendUnavailable instead of actually
  # exercising libsecret — see crates/permitlayer-keystore/tests/
  # conformance.rs:202. Windows DPAPI works out-of-the-box on hosted
  # runners; no backend prep needed.
  build-and-test:
    name: Build + Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, macos-13, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      # Linux-only: install libsecret build deps + start a secret-service
      # backend so LinuxKeyStore conformance tests exercise the real
      # libsecret path instead of skipping with BackendUnavailable.
      # The dbus-launch env vars are exported via $GITHUB_ENV so
      # subsequent steps inherit them (each Actions step runs in a
      # fresh shell — without persisting to $GITHUB_ENV the bus is
      # invisible to `cargo nextest run`).
      - name: Start secret-service backend (Linux only)
        if: matrix.os == 'ubuntu-latest'
        env:
          KEYRING_PW: test-passphrase-ci-only
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config gnome-keyring dbus-x11
          # Start a session dbus and persist its env into $GITHUB_ENV so
          # all subsequent steps see it.
          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"
          echo "DBUS_SESSION_BUS_PID=$DBUS_SESSION_BUS_PID" >> "$GITHUB_ENV"
          # Unlock gnome-keyring-daemon with a known passphrase so
          # secret-service is available + writable. The daemon
          # backgrounds itself; --unlock receives the passphrase on
          # stdin.
          printf '%s\n' "${KEYRING_PW}" | gnome-keyring-daemon --unlock --components=secrets &
          # Brief settle so the daemon registers on the bus before the
          # sanity check runs.
          sleep 1
          # Sanity-check: assert the secret-service interface is
          # actually reachable on the session bus. If this fails,
          # LinuxKeyStore would skip its conformance — the whole
          # point of this matrix leg is to NOT skip.
          dbus-send --session --print-reply --dest=org.freedesktop.secrets \
                    /org/freedesktop/secrets \
                    org.freedesktop.DBus.Properties.GetAll \
                    string:org.freedesktop.Secret.Service \
            || (echo "::error::secret-service backend did not start" && exit 1)
      - name: cargo build
        run: cargo build --workspace --all-targets --all-features
      # Use nextest, not `cargo test`. Nextest runs each test in a
      # separate process, isolating QuickJS sandbox state between
      # scrub-engine tests that would otherwise share a runtime and
      # intermittently flake (observed on macOS-14 runners).
      - name: cargo nextest run
        run: cargo nextest run --workspace --all-targets --all-features
      - name: Verify agentsso --version
        run: cargo run --quiet --bin agentsso -- --version

  credentials:
    name: Validate credential types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      - name: cargo xtask validate-credentials
        run: cargo xtask validate-credentials

  contrast:
    name: WCAG contrast validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      - name: cargo xtask contrast-check
        run: cargo xtask contrast-check

  plugin-api:
    name: Validate plugin API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      # Diff the live permitlayer-plugins host-API surface against
      # the committed host-api.lock. Fails on breaking changes that
      # were not accompanied by a major-version bump of
      # HOST_API_VERSION. See Story 6.5 + NFR41.
      - name: cargo xtask validate-plugin-api
        run: cargo xtask validate-plugin-api

  shellcheck:
    name: Shellcheck + test install scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck and minisign
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck minisign
      - name: Shellcheck install script
        run: shellcheck install/install.sh
      - name: Shellcheck Homebrew patch scripts (Story 7.1)
        run: |
          shellcheck scripts/patch-homebrew-formula.sh
          shellcheck scripts/test-patch-homebrew-formula.sh
      - name: Test Homebrew patch script (no brew — style portion skipped)
        run: ./scripts/test-patch-homebrew-formula.sh
      - name: Run install script tests
        run: ./install/test-install.sh

  # Re-runs the Homebrew patch-script test on macos-14 with brew
  # installed, so the rubocop/brew-style portion of the test (which
  # the Ubuntu shellcheck job skips) actually executes. Catches
  # rubocop-version drift between the committed `expected-output.rb`
  # fixture and what `brew style --fix` produces on the live runner.
  # If this fails after a rubocop update, regenerate the fixture per
  # the header comment of `scripts/test-patch-homebrew-formula.sh`.
  homebrew-style:
    name: Homebrew style guard (macos-14)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Test Homebrew patch script (brew style enforced)
        run: ./scripts/test-patch-homebrew-formula.sh

  # Story 7.2: smoke test the Windows PowerShell installer on the
  # canonical windows-latest runner. Story 7.7 will extend this to a
  # full cross-platform matrix with KeyStore conformance + integration
  # tests; for now we just exercise install.ps1's pure logic (arch
  # detection, sha256 verification, idempotent PATH mutation, version
  # parsing) without actually downloading a release artifact. The
  # release-time end-to-end test (download + install + version assert)
  # lives in release.yml's windows-publish-smoke job.
  windows-installer-test:
    name: Windows install.ps1 unit tests (windows-latest)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run install.ps1 unit tests
        shell: pwsh
        run: pwsh ./scripts/test-install-ps1.ps1

  security:
    name: Security audit + deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust toolchain
        run: rustup show active-toolchain || rustup toolchain install
      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit@0.22
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny@0.19
      # Advisory ignores are duplicated here and in deny.toml —
      # cargo-audit has no repo-local config file, so the list lives
      # inline. Rationale for each ignored ID must also appear in
      # deny.toml so reviewers can see why it was suppressed.
      - name: cargo audit
        run: cargo audit --deny warnings --ignore RUSTSEC-2026-0097
      - name: cargo deny check
        run: cargo deny check
