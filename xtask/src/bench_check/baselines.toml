# Criterion baseline mean walltimes (nanoseconds per iteration).
#
# Regenerate by running `cargo xtask bench-check` (without --enforce)
# on a quiescent host, then copying the measured values into this file.
# The in-file format is a flat `[benches]` table keyed by bench name.
#
# The 3× headroom multiplier (see `bench_check.rs` HEADROOM_MULTIPLIER)
# is what catches regressions. These values only need to be retuned
# after an intentional algorithmic change, a hardware upgrade, or a
# toolchain jump that shifts the baseline class. The absolute walltimes
# are host-specific; the `--enforce` gate still works meaningfully as
# long as the harness is run on the same class of machine these were
# seeded on. Regenerate locally after switching machines.
#
# See Story 8.6 AC #1–#2 for the harness contract.

